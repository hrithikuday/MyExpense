<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Email Sent - MyEarnings</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">

        <!-- Logo -->
        <div class="flex items-center justify-center mb-6">
            <a href="{% url 'xeon:home' %}" class="flex items-center gap-2 text-xl font-bold text-gray-900">
                {% include 'xeon/logo.html' %}
                <span>MyEarnings</span>
            </a>
        </div>

        <!-- Success Icon -->
        <div class="flex items-center justify-center mb-4">
            <div
                class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-2xl font-bold">
                ✉️
            </div>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-gray-900">
            Check Your Email
        </h2>
        <p class="text-sm text-gray-500 text-center mt-2 mb-6">
            We've sent a password reset link to your email address.
        </p>

        <!-- Info Box -->
        <div class="bg-blue-50 border border-blue-100 text-blue-700 text-xs rounded-xl p-4 mb-6 leading-relaxed">
            <strong>Don't see the email?</strong> Check your spam folder or try resending the reset link.
        </div>

        <!-- Back to Login -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Go back to
            <a href="{% url 'xeon:login_page' %}" class="text-black font-semibold hover:underline">
                Login
            </a>
        </p>

    </div>

</body>

</html>
