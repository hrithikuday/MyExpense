<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Password Reset Success - MyEarnings</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">

        <!-- Logo -->
        <div class="flex items-center justify-center mb-6">
            <a href="{% url 'xeon:home' %}" class="flex items-center gap-2 text-xl font-bold text-gray-900">
                {% include 'xeon/logo.html' %}
                <span>MyEarnings</span>
            </a>
        </div>

        <!-- Success Icon -->
        <div class="flex items-center justify-center mb-4">
            <div
                class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-2xl font-bold">
                ✓
            </div>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-gray-900">
            Password Reset Success!
        </h2>
        <p class="text-sm text-gray-500 text-center mt-2 mb-6">
            Your password has been successfully reset. You can now login with your new password.
        </p>

        <!-- Info Box -->
        <div
            class="bg-emerald-50 border border-emerald-100 text-emerald-700 text-xs rounded-xl p-4 mb-6 leading-relaxed text-center">
            <strong>Keep it secure!</strong> Don't share your password with anyone.
        </div>

        <!-- Submit Button / Go to Login -->
        <a href="{% url 'xeon:login_page' %}"
            class="w-full block text-center bg-black text-white py-2.5 rounded-lg hover:bg-gray-800 transition font-medium text-sm">
            Go to Login
        </a>

    </div>

</body>

</html>
