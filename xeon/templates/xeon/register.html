{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - MyEarnings</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8 my-8">

        <!-- Logo -->
        <div class="flex items-center justify-center mb-6">
            <a href="{% url 'xeon:home' %}" class="flex items-center gap-2 text-xl font-bold text-gray-900">
                <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>MyEarnings</span>
            </a>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-gray-900">
            Create an account
        </h2>
        <p class="text-sm text-gray-500 text-center mt-1 mb-6">
            Enter your details below to set up your account
        </p>

        <!-- Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Messages/Errors -->
            {% if messages %}
            <div class="bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg p-3 space-y-1">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <!-- First Name -->
            <div>
                <label class="text-sm font-medium text-gray-700">First Name</label>
                <input type="text" name="first_name" value="{{ first_name|default:'' }}" placeholder="John" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black text-sm" />
            </div>

            <!-- Last Name -->
            <div>
                <label class="text-sm font-medium text-gray-700">Last Name</label>
                <input type="text" name="last_name" value="{{ last_name|default:'' }}" placeholder="Doe" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black text-sm" />
            </div>

            <!-- Email (corresponds to username field in Django backend) -->
            <div>
                <label class="text-sm font-medium text-gray-700">Email Address</label>
                <input type="text" name="username" value="{{ username|default:'' }}" placeholder="m@example.com" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black text-sm" />
            </div>

            <!-- Password -->
            <div>
                <label class="text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black text-sm" />
            </div>

            <!-- Signup Button -->
            <button type="submit"
                class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition font-medium text-sm">
                Create Account
            </button>
        </form>



        <!-- Login Link -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account?
            <a href="{% url 'xeon:login_page' %}" class="text-black font-semibold hover:underline">
                Login here
            </a>
        </p>

    </div>

</body>
</html>
