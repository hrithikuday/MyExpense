<div class="w-10 h-8 flex items-center justify-center overflow-hidden select-none" aria-hidden="true">
    <div class="origin-center scale-[0.09] flex-shrink-0 relative w-96 h-64">
      <!-- Motion lines -->
      <div class="absolute left-0 top-24 flex flex-col gap-6">
        <div class="w-12 h-6 bg-lime-500 rounded-full"></div>
        <div class="w-16 h-6 bg-lime-500 rounded-full"></div>
        <div class="w-12 h-6 bg-lime-500 rounded-full"></div>
        <div class="w-14 h-6 bg-lime-500 rounded-full"></div>
      </div>

      <!-- Wallet -->
      <div class="relative w-72 h-48 bg-lime-500 rounded-[30px] overflow-hidden">
        
        <!-- Top cards -->
        <div class="absolute -top-10 right-10 w-28 h-20 bg-lime-700 rounded-lg rotate-45"></div>
        <div class="absolute -top-12 right-20 w-20 h-16 bg-lime-500 rounded-lg rotate-45"></div>

        <!-- Dollar circle -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
                    w-28 h-28 border-4 border-white rounded-full
                    flex items-center justify-center">
          <span class="text-white text-6xl font-bold">$</span>
        </div>

        <!-- Wallet strap -->
        <div class="absolute right-0 top-1/2 -translate-y-1/2
                    w-28 h-20 bg-lime-700 rounded-l-2xl
                    border-4 border-white">
          <div class="absolute right-6 top-1/2 -translate-y-1/2
                      w-5 h-5 bg-white rounded-full"></div>
        </div>

        <!-- Speed effect cutouts -->
        <div class="absolute left-0 top-10 space-y-5">
          <div class="w-32 h-6 bg-white rounded-r-full"></div>
          <div class="w-36 h-6 bg-white rounded-r-full"></div>
          <div class="w-40 h-6 bg-white rounded-r-full"></div>
          <div class="w-34 h-6 bg-white rounded-r-full"></div>
        </div>
      </div>
    </div>
</div>
