<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Finance Manager</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; background: #f1f5f9; color: #1f2937; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: min(460px, 100%);
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 28px 80px rgba(15,23,42,0.12);
            border: 1px solid rgba(148,163,184,0.18);
            padding: 3rem;
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .card > p {
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.7;
        }

        .form-row {
            display: grid;
            gap: 0.85rem;
            margin-bottom: 1.25rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
        }

        .field {
            position: relative;
        }

        .field input {
            width: 100%;
            min-height: 52px;
            padding: 0 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            background: #f8fafc;
            color: #0f172a;
            font-size: 0.96rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        .field input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
            background: #ffffff;
        }

        .btn-primary {
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #4338ca);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 18px 36px rgba(59,130,246,0.18);
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
        }

        .back-link a {
            color: #2563eb;
            font-weight: 600;
        }

        .error-list {
            background: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #991b1b;
        }

        .error-list ul {
            list-style: none;
            padding: 0;
        }

        .error-list li {
            padding: 0.25rem 0;
        }

        @media (max-width: 640px) {
            .card {
                padding: 2rem;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>

            {% if form.non_field_errors %}
                <div class="error-list">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <form method="POST" novalidate>
                {% csrf_token %}
                <div class="form-row">
                    <label for="{{ form.email.id_for_label }}">Email Address</label>
                    <div class="field">
                        {{ form.email }}
                    </div>
                    {% if form.email.errors %}
                        <div class="error-list">
                            {{ form.email.errors }}
                        </div>
                    {% endif %}
                </div>
                <button type="submit" class="btn-primary">Send Reset Link</button>
            </form>

            <div class="back-link">
                <p>Remember your password? <a href="{% url 'xeon:login_page' %}">Login here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
