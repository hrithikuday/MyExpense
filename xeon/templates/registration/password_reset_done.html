<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email - Finance Manager</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; background: #f1f5f9; color: #1f2937; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: min(500px, 100%);
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 28px 80px rgba(15,23,42,0.12);
            border: 1px solid rgba(148,163,184,0.18);
            padding: 3rem;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #4338ca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .card p {
            color: #64748b;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .info-box {
            background: #f0f9ff;
            border: 1px solid #bfdbfe;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            color: #0c4a6e;
        }

        .back-link {
            margin-top: 2rem;
        }

        .back-link a {
            color: #2563eb;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .card {
                padding: 2rem;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="success-icon">
                <i class="fa-solid fa-envelope"></i>
            </div>
            <h2>Check Your Email</h2>
            <p>We've sent a password reset link to your email address.</p>
            
            <div class="info-box">
                <p style="margin: 0;"><strong>Don't see the email?</strong> Check your spam folder or try resending the reset link.</p>
            </div>

            <div class="back-link">
                <p>Go back to <a href="{% url 'xeon:login_page' %}">Login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
