<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Success - Finance Manager</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; background: #f1f5f9; color: #1f2937; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: min(500px, 100%);
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 28px 80px rgba(15,23,42,0.12);
            border: 1px solid rgba(148,163,184,0.18);
            padding: 3rem;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #34d399);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .card p {
            color: #64748b;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .btn-primary {
            display: inline-block;
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, #2563eb, #4338ca);
            color: white;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s ease;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .info-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            color: #065f46;
        }

        @media (max-width: 640px) {
            .card {
                padding: 2rem;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2>Password Reset Success!</h2>
            <p>Your password has been successfully reset. You can now login with your new password.</p>
            
            <div class="info-box">
                <p style="margin: 0;"><strong>Keep it secure!</strong> Don't share your password with anyone.</p>
            </div>

            <a href="{% url 'xeon:login_page' %}" class="btn-primary">Go to Login</a>
        </div>
    </div>
</body>
</html>
